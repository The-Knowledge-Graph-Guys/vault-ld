name: CI

on:
  push:
    branches: [main]
  pull_request:

# The workflow only reads the repo; never hand it a writable token.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to full commit SHAs: a tag like @v4 is mutable, so
      # a compromised action repo could swap the code it points at (supply
      # chain). Bump the SHA and the trailing version comment together.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Reject tracked bytecode / venv
        run: |
          # Committed .pyc can diverge from the .py a reviewer reads — a
          # tampering vector. These must never land in the repo (SECURITY.md).
          if git ls-files | grep -E '(\.pyc$|__pycache__/|^venv/)'; then
            echo "::error::tracked bytecode or venv found — remove and gitignore it"
            exit 1
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Security regression suite (SECURITY.md)
        run: make test

      - name: Roundtrip test (SPEC §5.6)
        run: make roundtrip
